# ── API Common Configuration ──────────────────────────────────────────
x-api-common: &api-common
  image: klevercorrea/rinha-backend-zig:latest
  security_opt:
    - seccomp=unconfined
  ulimits:
    nofile:
      soft: 65535
      hard: 65535
  volumes:
    # Shared volume for Unix Domain Sockets (IPC).
    - rinha-sockets:/sockets
  deploy:
    resources:
      limits:
        cpus: "0.40"
        memory: "150MB"
  networks:
    - rinha-network

services:
  # ── Load Balancer (HAProxy) ─────────────────────────────────────────
  haproxy:
    image: haproxy:3.3-alpine
    container_name: rinha-haproxy
    security_opt:
      - seccomp=unconfined
    restart: always
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
      - rinha-sockets:/sockets
    ports:
      - "9999:9999"
    depends_on:
      api1:
        condition: service_started
      api2:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: "0.20"
          memory: "50MB"
    networks:
      - rinha-network

  # ── API Instance 1 ──────────────────────────────────────────────────
  api1:
    <<: *api-common
    container_name: rinha-api1
    environment:
      - SOCKET_PATH=/sockets/api1.sock

  # ── API Instance 2 ──────────────────────────────────────────────────
  api2:
    <<: *api-common
    container_name: rinha-api2
    environment:
      - SOCKET_PATH=/sockets/api2.sock

# ── Shared Storage ────────────────────────────────────────────────────
volumes:
  rinha-sockets:

# ── Networking ────────────────────────────────────────────────────────
networks:
  rinha-network:
    driver: bridge
